<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>撮影予約</title>
  <link rel="stylesheet" href="style.css?v=20260622-6" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">撮影予約</h1>
      <p class="subtitle">
        撮影日と時間を選択して、名前と備考を入力してください。<br />
        予約済みの枠は選択できません。
      </p>
    </header>

    <section class="section">
      <div class="section-title">1. 撮影日を選択</div>
      <div class="date-buttons" id="dateButtons"></div>
    </section>

    <section class="section">
      <div class="section-title">2. 空き時間を選択</div>
      <div class="slot-list" id="slotList"></div>
    </section>

    <section class="section">
      <div class="section-title">3. 予約内容</div>

      <div class="form-group">
        <label for="name">名前 必須</label>
        <input id="name" type="text" placeholder="例：とおる" autocomplete="name" />
      </div>

      <div class="form-group">
        <label for="note">備考 任意</label>
        <textarea id="note" placeholder="例：花魁イベ特典撮影 / 新衣装 / 衣装持参"></textarea>
        <div class="note">衣装、撮影内容、希望カットなどがあれば入力してください。</div>
      </div>
    </section>

    <section class="section">
      <div class="section-title">4. 確認</div>

      <div class="confirm-box">
        撮影日：<span id="confirmDate">未選択</span><br />
        時間：<span id="confirmTime">未選択</span><br />
        名前：<span id="confirmName">未入力</span>
      </div>

      <button class="submit-button" id="submitButton">この内容で予約する</button>
    </section>

    <div class="footer-note">
      送信後、予約内容は管理シートに保存されます。<br />
      変更・キャンセルは運営に連絡してください。
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="app.js?v=20260622-9"></script>
</body>
</html>
